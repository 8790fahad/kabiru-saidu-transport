name: 🚀 Deploy React Frontend to Hostinger

on:
  push:
    branches:
      - mf

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout Code
        uses: actions/checkout@v3

      - name: ⚙️ Install Dependencies
        run: npm install

      - name: 🛠️ Build React App
        run: npm run build

      - name: 🧪 Debug dist folder contents
        run: |
          echo "Files in dist:"
          ls -al ./dist

      - name: 🔍 Verify Secrets
        run: |
          echo "Checking if secrets are available..."
          if [ -z "${{ secrets.FTP_HOST_MF }}" ]; then
            echo "ERROR: FTP_HOST_MF secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_USERNAME_MF }}" ]; then
            echo "ERROR: FTP_USERNAME_MF secret is not set"
            exit 1
          fi
          if [ -z "${{ secrets.FTP_PASSWORD_MF }}" ]; then
            echo "ERROR: FTP_PASSWORD_MF secret is not set"
            exit 1
          fi
          echo "✓ All secrets are available (values are masked for security)"

      - name: 📤 Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: ./dist/
          server-dir: /
          dangerous-clean-slate: false
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.DS_Store
